<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Section</title>
    <style>
        .video-strip {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 1rem;
            gap: 1rem;
        }
        .video {
            position: relative;
            width: 300px;
            height: 200px;
            transition: transform 0.3s ease;
        }
        .video img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .video-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.5rem;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
        }
        .video:hover .video-title {
            opacity: 1;
        }
        .video:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="video-strip">
        <div class="video">
            <a href="<YOUR_VIDEO_LINK_1>"><img src="<YOUR_THUMBNAIL_LINK_1>" alt="Video 1"></a>
            <div class="video-title">Video Title 1</div>
        </div>
        <div class="video">
            <a href="<YOUR_VIDEO_LINK_2>"><img src="<YOUR_THUMBNAIL_LINK_2>" alt="Video 2"></a>
            <div class="video-title">Video Title 2</div>
        </div>
        <div class="video">
            <a href="<YOUR_VIDEO_LINK_3>"><img src="<YOUR_THUMBNAIL_LINK_3>" alt="Video 3"></a>
            <div class="video-title">Video Title 3</div>
        </div>
        <!-- Add more video elements as needed -->
    </div>
</body>
</html>
